<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
    <link rel="stylesheet" href="../styles/orders.head.css">
    <link rel="stylesheet" href="../styles/orders-body.css">
</head>
<body>
  <header class="header js-header">

    <section class="left-header">
      <a class="amazon-logo-mobile-link" href="./amazon.html">
        <img class="amazon-logo-mobile-icon" src="../images/amazon-mobile-logo-white.png">
      </a>
      <a class="amazon-logo-link" href="./amazon.html">
        <img class="amazon-logo" src="../images/amazon-logo-white.png">
      </a>
    </section>

    <section class="center-header">
        <input class="search-bar" 
        placeholder="Search">
        <button class="search-icon-btn">
          <img class="search-icon" src="../images/icons/search-icon.png">
        </button>
    </section>

    <section class="right-header">
        <div class="hamburger-menu js-hamburger-menu">
          <img class="hamburger-menu-icon" src="../images/icons/hamburger-menu.png">
        </div>
        <a href="./orders.html" class="orders-link">
          <div class="returns-orders-link">
            <div class="returns">
              Returns
            </div>
            <div class="orders">
              & Orders
            </div>
          </div>
        </a>
        <a class="cart-link" href="./checkout.html">
          <div class="cart-link-div">
            <div class="cart-count-position">
              <img class="cart-icon" src="../images/icons/cart-icon.png">
              <div class="cart-count js-cart-count">0</div>
            </div>
            <div class="cart-text">
              Cart
            </div>
          </div>
        </a>
    </section>

    <div class="mobile-header-div  js-mobile-header-div">
      <a class="mobile-returns-orders-link">
        <div class="mobile-returns-orders-div">
          Returns & Orders
        </div>
      </a>
      <a href="./checkout.html" class="mobile-checkout-link">
        <div class="mobile-checkout-div">
          Cart (<div class="mobile-cart-count js-mobile-cart-count">0</div>)
        </div>
      </a>
    </div>

  </header>

  <main class="main">
    <section class="orders-title">
      Your Orders
    </section>
    
    <section class="ordered-items-div">
      <main class="ordered-items">

        <section class="order-details">
          <div class="todays-date">
            Order Placed: August 12
          </div>
          <div class="total-price">
            Total: $35.06
          </div>
          <div class="order-id">
            Order ID: 27cba69d-4c3d-4098-b43d-ac7fa62b7664
          </div>
        </section>

        <section class="products-div">
          <div class="product">
            <img src="../images/products/athletic-cotton-socks-6-pairs.jpg" class="product-image">
            <div class="product-details">
              <div class="product-name">
                Black and Gray Athletic Cotton Socks - 6 Pairs
              </div>
              <div class="delivey-date">
                Arriving on: August 15
              </div>
              <div class="quantity">
                Quantity: 1
              </div>
              <div class="buy-again-div">
                <img src="../images/icons/buy-again.png" class="buy-again-img">
                <div class="buy-again-txt">
                  Buy it again
                </div>
              </div>
            </div>
            <div class="track-div">
              <div class="track-txt">
                Track package
              </div>
            </div>
          </div>
        </section>
      </main>
    </section>
  </main>
</body>
</html>
