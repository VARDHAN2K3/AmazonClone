<!DOCTYPE html>
<html>
<head>
    <title>Check Out</title>
    <link rel="stylesheet" href="../styles/checkout-header.css">
    <link rel="stylesheet" href="../styles/checkout-general.css">
    <link rel="stylesheet" href="../styles/checkout-body.css">
</head>
<body>
    <header class="header-div js-header-div">
        <header class="header">
            <section class="left-header">
                <a href="./amazon.html">
                    <img src="../images/amazon-mobile-logo.png" class="amazon-mobile-logo">
                </a>
                <a href="./amazon.html">
                    <img src="../images/amazon-logo.png" class="amazon-logo">
                </a>
            </section>
            <section class="center-header">
                <div class="checkout-txt">
                    Checkout (<label class="checkout-count js-checkout-count">0 items</label>)
                </div>
            </section>
            <section class="right-header">
                <img src="../images/icons/checkout-lock-icon.png" class="checkout-lock-icon">
            </section>
        </header>
    </header>
    
    <main class="checkout-main js-checkout-main">
        <div class="title">
            Review your order
        </div>
        <div class="checkout-grid">

            <div class="cart-list js-cart-list">
            </div>

            <div class="order-summary">
                <div class="os-title">
                    Order Summary
                </div>
                <div class="items-cost-div">
                    <div>Items(<label>1</label>):</div>
                    <div class="price">$0.00</div>
                </div>
                <div class="shipping-div">
                    <div class="shipping">Shipping & handling:</div>
                    <div class="price">$0.00</div>
                </div>
                <div class="total-before-tax-div">
                    <div class="t-b-t">Total before tax:</div>
                    <div class="total-cost-btax">$0.00</div>
                </div>
                <div class="tax-div">
                    <div>Estimated tax(10%):</div>
                    <div class="price">$0.00</div>
                </div>
                <div class="total">
                    <div>Order total:</div>
                    <div class="total-price">$0.00</div>
                </div>
                <div class="checkbox-div">
                    <div>Use PayPal</div>
                    <input type="checkbox" class="checkbox">
                </div>
                <button class="paypal-btn">
                    Place your order
                </button>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
    <script type="module" src="../javascript/checkout.js"></script>
</body>
</html>
