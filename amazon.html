<!DOCTYPE html>
<html>
<head>
  <title>Amazon Project</title>
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/amazon.css">
</head>
<body>
  <header class="header">
    <section class="left-header">
      <div class="amazon-logo-mobile-link">
        <img class="amazon-logo-mobile-icon" src="images/amazon-mobile-logo-white.png">
      </div>
      <div class="amazon-logo-link">
        <img class="amazon-logo" src="images/amazon-logo-white.png">
      </div>
    </section>
    <section class="center-header">
      <input class="search-bar" 
      placeholder="Search">
      <button class="search-icon-btn">
        <img class="search-icon" src="images/icons/search-icon.png">
      </button>
    </section>
    <section class="right-header">
      <div class="hamburgur-menu">
        <img class="hamburgur-menu-icon" src="images/icons/hamburger-menu.png">
      </div>
      <div class="returns-orders-cart">
        <div class="returns-orders-link">
          <div class="returns">
            Returns
          </div>
          <div class="orders">
            & Orders
          </div>
        </div>
        <div class="cart-link">
          <div class="cart-count-position">
            <img class="cart-icon" src="images/icons/cart-icon.png">
            <div class="cart-count js-cart-count">0</div>
          </div>
          <div class="cart-text">
            Cart
          </div>
        </div>
      </div>
    </section>
  </header>
  
  <main class="products-main js-products-main">
  </main>

  <script src="javascript/cart.js"></script>
  <script src="javascript/amazon.js"></script>
</body>
</html>
